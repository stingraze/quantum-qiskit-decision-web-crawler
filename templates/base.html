<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QuantumCrawler{% endblock %} – QuantumCrawler</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-bg-circuit" aria-hidden="true">
      <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="circuit-nav" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
            <line x1="0" y1="20" x2="20" y2="20" stroke="#58a6ff" stroke-width="0.4" opacity="0.25"/>
            <line x1="20" y1="20" x2="20" y2="5" stroke="#58a6ff" stroke-width="0.4" opacity="0.25"/>
            <line x1="20" y1="5" x2="50" y2="5" stroke="#58a6ff" stroke-width="0.4" opacity="0.25"/>
            <circle cx="20" cy="20" r="1.5" fill="#58a6ff" opacity="0.35"/>
            <circle cx="50" cy="5" r="1.5" fill="#3fb950" opacity="0.35"/>
            <line x1="50" y1="5" x2="50" y2="35" stroke="#3fb950" stroke-width="0.4" opacity="0.20"/>
            <line x1="50" y1="35" x2="80" y2="35" stroke="#3fb950" stroke-width="0.4" opacity="0.20"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#circuit-nav)"/>
      </svg>
    </div>
    <div class="navbar-inner">
      <a href="{{ url_for('dashboard') }}" class="navbar-brand">
        <span class="brand-icon">⚛</span>
        <span class="brand-name">QuantumCrawler</span>
      </a>
      <ul class="navbar-links">
        <li><a href="{{ url_for('dashboard') }}" class="nav-link{% if request.endpoint == 'dashboard' %} active{% endif %}">Dashboard</a></li>
        <li><a href="{{ url_for('crawl_new') }}" class="nav-link{% if request.endpoint in ('crawl_new', 'crawl_new_post') %} active{% endif %}">New Crawl</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <span>QuantumCrawler UI &mdash; powered by Qiskit &amp; Flask</span>
      <span class="footer-sep">|</span>
      <span>quantum-qiskit-decision-web-crawler</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
